<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpert911 Auto Care | Premium Mobile Detailing Calicut</title>
    <meta name="description" content="Premium Mobile Detailing in Calicut. Professional car care at your doorstep. Prices starting at ₹249.">
    <meta property="og:title" content="Xpert911 Auto Care | Premium Detailing">
    <meta property="og:description" content="We come to you. Expert care. Anytime. Anywhere.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,700;0,900;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --gold-dim: #8a6f1e;
            --deep-black: #050505;
            --card-bg: #0c0c0c;
            --soft-white: #e0e0e0;
            --muted: #666;
            --whatsapp: #25D366;
            --thin-border: rgba(212,175,55,0.25);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background: var(--deep-black);
            scroll-behavior: smooth;
            outline: 2px solid var(--gold);
            outline-offset: -2px;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--deep-black);
            color: var(--soft-white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ── NAV ── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5,5,5,0.94);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--thin-border);
            display: flex;
            justify-content: center;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .top-nav::-webkit-scrollbar { display: none; }
        .nav-link {
            color: #777;
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 14px 14px;
            transition: color 0.3s, border-color 0.3s;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            font-weight: 600;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* ── HEADER ── */
        header {
            padding: 55px 20px 20px;
            text-align: center;
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 1px;
            background: var(--gold-gradient);
        }

        .logo {
            width: 80%;
            max-width: 400px;
            height: auto;
            filter: drop-shadow(0 0 18px rgba(212,175,55,0.25));
            animation: fadeSlideDown 1.2s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes fadeSlideDown {
            from { opacity:0; transform: translateY(-20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* ── HERO ── */
        .hero {
            padding: 28px 20px 20px;
            text-align: center;
            animation: fadeSlideDown 1.4s cubic-bezier(0.16,1,0.3,1) both;
        }
        .hero-eyebrow {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 10px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .brand-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 5s linear infinite;
            filter: drop-shadow(0 0 8px rgba(212,175,55,0.2));
        }
        @keyframes goldShine {
            to { background-position: 200% center; }
        }
        .tagline {
            font-size: 0.7rem;
            color: #666;
            font-style: italic;
            margin-top: 8px;
            letter-spacing: 1.5px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            color: var(--soft-white);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            border: 1px solid var(--thin-border);
            padding: 6px 18px;
            border-radius: 20px;
            transition: all 0.3s;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }
        .social-link:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        /* ── STATS ── */
        .stats-strip {
            display: flex;
            justify-content: center;
            margin: 35px 20px;
            border: 1px solid var(--thin-border);
            border-radius: 6px;
            overflow: hidden;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
            background: var(--card-bg);
        }
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 22px 8px;
            border-right: 1px solid var(--thin-border);
            position: relative;
        }
        .stat-item:last-child { border-right: none; }
        .stat-number {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.5rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
            display: block;
        }

        /* ── SECTION HEADERS ── */
        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .section-eyebrow {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 4px;
            color: var(--gold-dim);
            text-transform: uppercase;
            font-weight: 600;
        }
        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .section-title .accent { color: var(--gold); }
        .section-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        .section-divider span { width: 40px; height: 1px; background: var(--thin-border); display: block; }
        .section-divider i { color: var(--gold); font-size: 0.5rem; }

        /* ── QUALITY PILLARS ── */
        .standard-section {
            padding: 50px 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 30px;
        }
        .pillar-card {
            border: 1px solid var(--thin-border);
            padding: 28px 16px 22px;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .pillar-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(212,175,55,0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .pillar-card:hover { border-color: var(--gold); transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 0 20px rgba(212,175,55,0.08); }
        .pillar-card:hover::before { opacity: 1; }
        .pillar-icon {
            font-size: 1.8rem;
            margin-bottom: 14px;
            display: block;
            filter: drop-shadow(0 0 4px rgba(212,175,55,0.15));
            transition: transform 0.3s, filter 0.3s;
        }
        .pillar-card:hover .pillar-icon { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--gold)); }
        .pillar-card h4 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: white;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .pillar-card p { font-size: 0.62rem; color: #666; }

        /* ── GALLERY ── */
        .gallery-section { padding: 0 20px 50px; max-width: 850px; margin: 0 auto; }
        .gallery-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        .gallery-item {
            position: relative;
            border: 1px solid var(--thin-border);
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 4/3;
            background: #0f0f0f;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25,1,0.5,1);
        }
        .gallery-item:hover img { transform: scale(1.08); }
        .gallery-item-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            gap: 10px; color: #222;
        }
        .gallery-item-placeholder span:first-child { font-size: 2rem; }
        .gallery-item-placeholder span:last-child { font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; }
        .gallery-label {
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.85);
            color: var(--gold);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.58rem;
            padding: 5px 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 2px solid var(--gold);
            z-index: 2;
        }
        .gallery-item.wide { grid-column: span 2; aspect-ratio: 16/7; }

        /* ── STAR FEATURE / SIGNATURE SERVICE ── */
        .star-feature-wrapper { padding: 0 20px; margin: 10px 0 0; }
        .star-feature-container {
            border-radius: 14px 14px 0 0;
            padding: 2px;
            background: var(--gold-gradient);
            background-size: 300% 300%;
            animation: borderPulse 5s ease infinite;
            box-shadow: 0 -4px 30px rgba(212,175,55,0.15);
        }
        @keyframes borderPulse {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .star-inner {
            background: radial-gradient(ellipse at 50% 0%, #1a1500 0%, #080808 60%);
            padding: 30px 22px 24px;
            border-radius: 12px 12px 0 0;
        }
        .star-badge {
            display: inline-block;
            background: rgba(212,175,55,0.1);
            border: 1px solid var(--thin-border);
            color: var(--gold);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .star-rating { color: var(--gold-light); font-size: 0.85rem; letter-spacing: 2px; }
        .time-tag {
            background: rgba(255,255,255,0.07);
            color: #ddd;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .star-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            margin-bottom: 14px;
            line-height: 1.2;
        }
        .star-description p { color: #999; font-size: 0.82rem; line-height: 1.6; }
        .star-description strong { color: var(--gold-light); }
        .price-highlight { margin: 22px 0 0; }
        .price-highlight .label {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            color: var(--gold);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
        .price-highlight .amount {
            font-family: 'Rajdhani', sans-serif;
            color: white;
            font-size: 2.6rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .price-highlight .amount sub { font-size: 1rem; color: var(--gold); }
        .specs-row {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }
        .spec-box {
            flex: 1;
            background: rgba(212,175,55,0.04);
            padding: 12px 6px;
            border-radius: 8px;
            border: 1px solid var(--thin-border);
            text-align: center;
        }
        .spec-icon { display: block; font-size: 1.2rem; margin-bottom: 5px; }
        .spec-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.58rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* ── WHATSAPP BAR ── */
        .whatsapp-extension { padding: 0 20px 50px; }
        .wa-gradient-wrap {
            padding: 2px;
            border-radius: 0 0 14px 14px;
            background: linear-gradient(90deg, var(--gold), #1a1200, var(--gold));
        }
        .wa-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #080808;
            padding: 16px 20px;
            border-radius: 0 0 12px 12px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .wa-bar:hover { background: #111; }
        .wa-content { display: flex; align-items: center; gap: 12px; }
        .wa-icon-circle {
            width: 38px; height: 38px;
            background: var(--whatsapp);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(37,211,102,0.3);
        }
        .wa-text p:first-child {
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .wa-text p:last-child { color: #555; font-size: 0.65rem; margin-top: 2px; }
        .wa-arrow { color: var(--gold); font-size: 1.2rem; }

        /* ── PACKAGES ── */
        .packages-section { max-width: 850px; margin: 0 auto; padding: 50px 20px; }
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
        }
        .package-card {
            border: 1px solid var(--thin-border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--card-bg);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            position: relative;
        }
        .package-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
        }
        .package-card.featured { border-color: var(--gold); background: rgba(20,16,2,0.8); }
        .package-badge {
            position: absolute;
            top: 10px; right: 10px;
            background: var(--gold);
            color: black;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.48rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .package-header {
            padding: 22px 16px 16px;
            border-bottom: 1px solid var(--thin-border);
            text-align: center;
        }
        .package-icon { font-size: 1.6rem; display: block; margin-bottom: 10px; }
        .package-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .package-price {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: white;
        }
        .package-price span { font-size: 0.65rem; color: #555; font-weight: 400; }
        .package-body { padding: 16px; }
        .package-feature {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.68rem;
            color: #aaa;
            line-height: 1.4;
        }
        .pkg-check { color: var(--gold); flex-shrink: 0; }
        .pkg-x { color: #2a2a2a; flex-shrink: 0; }
        .package-cta {
            display: block;
            margin: 0 16px 16px;
            padding: 11px;
            text-align: center;
            border: 1px solid var(--thin-border);
            border-radius: 4px;
            color: var(--gold);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            transition: all 0.3s;
        }
