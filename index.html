<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpert911 | Ultra-Premium Mobile Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e2b04a;
            --gold-bright: #fff3ad;
            --deep-black: #030303;
            --surface: rgba(20, 20, 20, 0.7);
            --border-glow: rgba(226, 176, 74, 0.3);
            --transition-fluid: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            background-color: var(--deep-black);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 10% 20%, rgba(226, 176, 74, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(226, 176, 74, 0.08) 0%, transparent 40%);
        }

        .reveal { opacity: 0; transform: translateY(50px); transition: var(--transition-fluid); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- HEADER & NAV --- */
        .header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(3, 3, 3, 0.7);
        }
        .nav-content {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 900;
            letter-spacing: 4px; background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 60vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 0 20px;
        }
        .hero-tag {
            font-size: 0.8rem; letter-spacing: 8px; text-transform: uppercase;
            color: var(--gold); margin-bottom: 20px; display: block;
            text-shadow: 0 0 10px rgba(226, 176, 74, 0.5);
        }
        .hero-title {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 10vw, 5rem);
            line-height: 1.1; margin: 0; font-weight: 900;
        }
        .glow-line {
            width: 100px; height: 2px; background: var(--gold);
            margin: 40px auto; box-shadow: 0 0 20px var(--gold);
        }

        /* --- PREMIUM PRICING TABLE (MATCHING IMAGE) --- */
        .pricing-section { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        
        .table-container {
            background: rgba(10, 10, 10, 0.6); 
            border: 1px solid var(--border-glow);
            border-radius: 12px; overflow: hidden; 
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        
        th { 
            text-align: left; padding: 30px 25px; font-size: 0.65rem; letter-spacing: 3px;
            text-transform: uppercase; color: var(--gold); 
            background: rgba(226, 176, 74, 0.03);
            border-bottom: 1px solid var(--border-glow);
        }

        td { 
            padding: 22px 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            font-size: 0.9rem; 
            font-weight: 400;
            color: #efefef;
        }

        .vehicle-name { font-family: 'Montserrat'; font-weight: 200; color: #fff; letter-spacing: 1px; }
        .price-cell { font-family: 'Montserrat'; font-weight: 600; text-align: right; }
        .premium-col { background: rgba(226, 176, 74, 0.02); }

        tr:hover td { background: rgba(226, 176, 74, 0.05); color: var(--gold-bright); }

        /* --- SHIMMER TEXT --- */
        .shimmer {
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- LUXURY FORM --- */
        .form-card {
            max-width: 800px; margin: 100px auto; padding: 60px 40px;
            background: radial-gradient(circle at top left, #111, #030303);
            border: 1px solid var(--border-glow); border-radius: 20px;
        }
        .input-group { margin-bottom: 40px; }
        .input-group label {
            font-size: 0.6rem; color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; font-weight: 800; display: block; margin-bottom: 10px;
        }
        .input-group input, .input-group select {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0; color: #fff; font-size: 1rem; transition: 0.3s;
        }
        .input-group input:focus { outline: none; border-bottom-color: var(--gold); }

        .cta-button {
            display: inline-block; padding: 22px 40px; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; font-weight: 800;
            letter-spacing: 4px; text-transform: uppercase; font-size: 0.75rem;
            width: 100%; text-align: center; cursor: pointer; transition: 0.4s;
        }
        .cta-button:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        /* --- DOCK --- */
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; width: 90%; max-width: 450px; z-index: 2000;
        }
        .dock-btn {
            flex: 1; padding: 20px; text-align: center; text-decoration: none;
            border-radius: 12px; font-weight: 900; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-black { background: rgba(255,255,255,0.1); color: #fff; backdrop-filter: blur(10px); }
        .btn-green { background: #25D366; color: #000; }
        .dock-btn:hover { transform: translateY(-5px); }

        @media (max-width: 768px) {
            .table-scroll { overflow-x: auto; }
            .hero-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-content">
        <div class="logo">XPERT911</div>
        <a href="#book" style="color: var(--gold); text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; font-weight: 800;">RESERVE NOW</a>
    </div>
</header>

<section class="hero reveal">
    <span class="hero-tag">Automotive Concierge</span>
    <h1 class="hero-title">TIERED<br><span class="shimmer">INVESTMENT</span></h1>
    <div class="glow-line"></div>
</section>

<section class="pricing-section reveal">
    <div class="table-scroll">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 30%;">Vehicle Type</th>
                        <th style="text-align: right;">Basic Wash</th>
                        <th style="text-align: right;" class="premium-col">Premium Wash</th>
                        <th style="text-align: right;">Complete Detailing</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="vehicle-name">Hatchback</td>
                        <td class="price-cell">₹249</td>
                        <td class="price-cell premium-col">₹399</td>
                        <td class="price-cell">₹899</td>
                    </tr>
                    <tr>
                        <td class="vehicle-name">Sedan</td>
                        <td class="price-cell">₹299</td>
                        <td class="price-cell premium-col">₹449</td>
                        <td class="price-cell">₹999</td>
                    </tr>
                    <tr>
                        <td class="vehicle-name">Compact SUV</td>
                        <td class="price-cell">₹349</td>
                        <td class="price-cell premium-col">₹499</td>
                        <td class="price-cell">₹1099</td>
                    </tr>
                    <tr>
                        <td class="vehicle-name">SUV</td>
                        <td class="price-cell">₹399</td>
                        <td class="price-cell premium-col">₹599</td>
                        <td class="price-cell">₹1299</td>
                    </tr>
                    <tr>
                        <td class="vehicle-name">MPV</td>
                        <td class="price-cell">₹449</td>
                        <td class="price-cell premium-col">₹649</td>
                        <td class="price-cell">₹1399</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<section id="book" class="form-card reveal">
    <div style="text-align: center; margin-bottom: 60px;">
        <h2 style="font-family: 'Cinzel'; font-size: 2rem;">Secure Booking</h2>
        <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--gold);">PREMIUM CALICUT SERVICE</p>
    </div>
    
    <form id="luxeForm">
        <div class="input-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Full Name" required>
        </div>
        
        <div class="input-group">
            <label>Vehicle</label>
            <input type="text" id="vehicle" placeholder="Example: Toyota Fortuner" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="input-group">
                <label>Service Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="input-group">
                <label>Investment Tier</label>
                <select id="service" style="background: black; color: white; border:none; border-bottom:1px solid rgba(255,255,255,0.1); padding: 15px 0;">
                    <option>Premium Wash</option>
                    <option>Complete Detailing</option>
                    <option>Basic Wash</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Address</label>
            <input type="text" id="location" placeholder="Service Location in Calicut" required>
        </div>

        <button type="submit" class="cta-button">Confirm Reservation</button>
    </form>
</section>

<div class="dock">
    <a href="tel:+917356204215" class="dock-btn btn-black">Call Studio</a>
    <a href="https://wa.me/917356204215" class="dock-btn btn-green">WhatsApp</a>
</div>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { 
            if (entry.isIntersecting) entry.target.classList.add('active'); 
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    document.getElementById('luxeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = `SERVICE REQUEST:%0A- Name: ${document.getElementById('name').value}%0A- Vehicle: ${document.getElementById('vehicle').value}%0A- Tier: ${document.getElementById('service').value}%0A- Date: ${document.getElementById('date').value}%0A- Location: ${document.getElementById('location').value}`;
        window.open(`https://wa.me/917356204215?text=${msg}`, '_blank');
    });
</script>

</body>
</html>
