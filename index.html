<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpert911 Auto Care | Premium Mobile Detailing Calicut</title>
    
    <meta name="description" content="Premium Mobile Detailing in Calicut. Professional car care at your doorstep. Prices starting at ₹249.">
    <meta property="og:title" content="Xpert911 Auto Care | Premium Detailing">
    <meta property="og:description" content="We come to you. Expert care. Anytime. Anywhere.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --deep-black: #050505;
            --soft-white: #e0e0e0;
            --whatsapp: #25D366;
            --thin-border: rgba(212, 175, 55, 0.3);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
        }

        html {
            border: 2px solid var(--gold);
            min-height: 100%;
            box-sizing: border-box;
            background-color: var(--deep-black);
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--deep-black); 
            color: var(--soft-white); 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px; 
        }

        /* ── NAV BAR ── */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5,5,5,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--thin-border);
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 0;
        }
        .nav-link {
            color: #888;
            text-decoration: none;
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px 16px;
            transition: color 0.3s;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        header { padding: 60px 0 30px 0; text-align: center; }

        .logo { 
            width: 85%; 
            max-width: 450px; 
            height: auto; 
            filter: drop-shadow(0px 0px 10px rgba(212, 175, 55, 0.2));
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero { padding: 0px 20px 30px 20px; text-align: center; }
        .hero h2 { font-size: 0.75rem; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; font-weight: 300; }
        
        .gold-glow-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 4s linear infinite;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
            font-weight: 800;
        }

        @keyframes gold-shine {
            to { background-position: 200% center; }
        }

        .brand-title { font-size: 1.8rem; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .tagline { font-size: 0.7rem; color: #888; font-style: italic; margin-top: 10px; letter-spacing: 1px; }

        .social-link {
            display: inline-flex;
            margin-top: 15px;
            align-items: center;
            color: var(--soft-white);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border: 1px solid var(--thin-border);
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .social-link:hover { background: var(--gold); color: black; border-color: var(--gold); }

        /* ── STATS STRIP ── */
        .stats-strip {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 30px 20px;
            border: 1px solid var(--thin-border);
            border-radius: 8px;
            overflow: hidden;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 20px 10px;
            border-right: 1px solid var(--thin-border);
            background: rgba(255,255,255,0.01);
        }
        .stat-item:last-child { border-right: none; }
        .stat-number {
            display: block;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.55rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 5px;
            display: block;
        }

        /* ── QUALITY PILLARS ── */
        .standard-section { padding: 40px 20px; max-width: 850px; margin: 0 auto; text-align: center; }
        .pillar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .pillar-card { 
            border: 1px solid var(--thin-border); 
            padding: 25px 15px; 
            border-radius: 4px; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            background: rgba(255,255,255,0.02); 
            position: relative;
            overflow: hidden;
        }
        .pillar-card:hover { 
            border-color: var(--gold); 
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .pillar-icon { 
            color: var(--gold); 
            font-size: 1.8rem; 
            margin-bottom: 15px; 
            display: block;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2));
        }
        .pillar-card:hover .pillar-icon { transform: scale(1.2); filter: drop-shadow(0 0 10px var(--gold)); }
        .pillar-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 20%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.1), transparent);
            transform: rotate(30deg);
            transition: all 0.8s;
        }
        .pillar-card:hover::after { left: 120%; }
        .pillar-card h4 { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; color: white; }
        .pillar-card p { font-size: 0.65rem; color: #888; margin: 0; }

        /* ── GALLERY ── */
        .gallery-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            max-width: 850px; 
            margin: 20px auto; 
            padding: 0 20px; 
        }
        .gallery-item { 
            position: relative; 
            border: 1px solid var(--thin-border); 
            overflow: hidden; 
            border-radius: 4px;
            aspect-ratio: 4 / 3; 
            background: #111;
        }
        .gallery-item img { 
            width: 100%; height: 100%; 
            object-fit: cover; display: block;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-label { 
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.85); color: var(--gold); 
            font-size: 0.6rem; padding: 5px 12px; 
            text-transform: uppercase; letter-spacing: 2px;
            z-index: 2; border-left: 2px solid var(--gold);
        }

        /* ── BEFORE/AFTER SLIDER ── */
        .ba-section { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .ba-title { text-align: center; margin-bottom: 20px; }
        .ba-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border: 1px solid var(--thin-border);
            border-radius: 8px;
            overflow: hidden;
            cursor: col-resize;
            user-select: none;
        }
        .ba-after, .ba-before {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
        }
        .ba-after {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            display: flex; align-items: center; justify-content: flex-end;
        }
        .ba-before {
            background: linear-gradient(135deg, #2a2a1a 0%, #1a1500 100%);
            clip-path: inset(0 50% 0 0);
            display: flex; align-items: center; justify-content: flex-start;
        }
        /* Placeholder visuals inside BA */
        .ba-after-img, .ba-before-img {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 8px;
        }
        .ba-after-img { background: linear-gradient(135deg, #101010 0%, #050505 100%); }
        .ba-before-img { background: linear-gradient(135deg, #1c1800 0%, #2a2200 100%); }
        .ba-label-overlay {
            position: absolute;
            top: 12px;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
        }
        .ba-label-before { left: 12px; background: rgba(0,0,0,0.7); color: #aaa; border: 1px solid #333; }
        .ba-label-after { right: 12px; background: rgba(0,0,0,0.7); color: var(--gold); border: 1px solid var(--thin-border); }
        .ba-divider {
            position: absolute;
            top: 0; left: 50%;
            width: 2px; height: 100%;
            background: var(--gold);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(212,175,55,0.6);
        }
        .ba-handle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background: var(--gold);
            border-radius: 50%;
            z-index: 11;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            color: black;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
            pointer-events: none;
        }
        .ba-placeholder-icon { font-size: 2.5rem; opacity: 0.15; }
        .ba-placeholder-text { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.3; }

        /* ── STAR FEATURE ── */
        .star-feature-container {
            margin: 40px 20px 0 20px;
            padding: 2px;
            border-radius: 20px 20px 0 0;
            background: var(--gold-gradient);
            background-size: 300% 300%;
            animation: border-dance 4s linear infinite;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .star-inner {
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            padding: 30px 20px;
            border-radius: 18px 18px 0 0;
            text-align: center;
        }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .star-rating { color: var(--gold-light); font-size: 1rem; }
        .time-tag { background: rgba(255,255,255,0.1); color: #fff; font-size: 0.7rem; padding: 4px 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; }
        .star-title { color: #fff; font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        .star-description p { color: #bbb; font-size: 0.9rem; line-height: 1.5; margin: 0; }
        .star-description strong { color: var(--gold-light); }
        .price-highlight { margin: 20px 0; }
        .price-highlight .label { display: block; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        .price-highlight .amount { color: #fff; font-size: 2.2rem; font-weight: 900; }
        .specs-row { display: flex; justify-content: space-between; margin-top: 25px; gap: 8px; }
        .spec-box { flex: 1; background: rgba(212, 175, 55, 0.05); padding: 10px 5px; border-radius: 10px; border: 1px solid var(--thin-border); }
        .spec-icon { display: block; font-size: 1.2rem; margin-bottom: 5px; }
        .spec-text { font-size: 0.6rem; color: #eee; text-transform: uppercase; letter-spacing: 1px; }

        /* ── WHATSAPP EXTENSION ── */
        .whatsapp-extension {
            margin: 0 20px 40px 20px;
            padding: 2px;
            border-radius: 0 0 20px 20px;
            background: linear-gradient(90deg, var(--gold), #000, var(--gold));
        }
        .wa-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d0d0d;
            padding: 15px 20px;
            border-radius: 0 0 18px 18px;
            text-decoration: none;
        }
        .wa-content { display: flex; align-items: center; gap: 10px; }
        .wa-icon { width: 22px; height: 22px; filter: drop-shadow(0 0 5px rgba(37, 211, 102, 0.4)); }
        .wa-bar p { color: #fff; font-size: 0.8rem; margin: 0; }
        .wa-bar p span { color: var(--gold-light); font-weight: bold; }

        /* ── PACKAGE COMPARISON ── */
        .packages-section { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .packages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 25px; }
        .package-card {
            border: 1px solid var(--thin-border);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .package-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.08);
        }
        .package-card.featured {
            border-color: var(--gold);
            background: rgba(212,175,55,0.05);
        }
        .package-badge {
            position: absolute;
            top: 12px; right: 12px;
            background: var(--gold);
            color: black;
            font-size: 0.5rem;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .package-header { padding: 20px 16px 15px; border-bottom: 1px solid var(--thin-border); text-align: center; }
        .package-name { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin: 0 0 8px; }
        .package-price { font-size: 1.5rem; font-weight: 900; color: white; }
        .package-price span { font-size: 0.65rem; color: #666; font-weight: 400; }
        .package-body { padding: 16px; }
        .package-feature {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.7rem;
            color: #bbb;
        }
        .pkg-check { color: var(--gold); font-size: 0.8rem; flex-shrink: 0; margin-top: 1px; }
        .pkg-x { color: #444; font-size: 0.8rem; flex-shrink: 0; margin-top: 1px; }
        .package-cta {
            display: block;
            margin: 16px;
            padding: 10px;
            text-align: center;
            border: 1px solid var(--thin-border);
            border-radius: 4px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .package-cta:hover, .package-card.featured .package-cta {
            background: var(--gold);
            color: black;
            border-color: var(--gold);
        }

        /* ── PRICING TABLE ── */
        .pricing-section { padding: 20px 20px 40px 20px; max-width: 850px; margin: 0 auto; }
        .section-header { margin-bottom: 25px; text-align: center; }
        .service-header-glow { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 4px; }
        .table-container { overflow-x: auto; background: rgba(255,255,255,0.01); border: 1px solid var(--thin-border); border-radius: 8px; position: relative; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { text-align: left; padding: 15px 20px; font-size: 0.6rem; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--thin-border); }
        td { padding: 12px 20px; font-size: 0.8rem; border-bottom: 1px solid #111; }
        .price-col { font-weight: 700; color: white; text-align: right; }
        .highlight-col { background: rgba(212, 175, 55, 0.05); }

        /* ── BOOKING FORM ── */
        .booking-section {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .booking-card {
            border: 1px solid var(--thin-border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.01);
        }
        .booking-header {
            background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.03) 100%);
            padding: 25px;
            border-bottom: 1px solid var(--thin-border);
            text-align: center;
        }
        .booking-header h3 { margin: 0 0 5px; color: white; font-size: 1.1rem; }
        .booking-header p { margin: 0; color: #666; font-size: 0.7rem; letter-spacing: 1px; }
        .booking-body { padding: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--thin-border);
            border-radius: 4px;
            color: var(--soft-white);
            padding: 12px 14px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        .form-group select { cursor: pointer; }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            background: rgba(212,175,55,0.05);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-full { margin-bottom: 15px; }
        .booking-submit {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 0.7
